name: Bitstream Generation

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Generate Bitstream
        working-directory: chipinvaders
        run: nix develop github:openxc7/toolchain-nix --command make bits

      - name: Upload Bitstream Artifact
        uses: actions/upload-artifact@v6
        with:
          name: chipinvaders-bitstream
          path: chipinvaders/chipinvaders.bit
          if-no-files-found: error
